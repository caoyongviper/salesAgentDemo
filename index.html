<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售智能体</title>
    <link rel="stylesheet" href="style.css">
    <script src="customerAnalysis.js"></script>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <img src="thinker-logo.png" width="28" height="28" style="border-radius: 50%;">
                    </div>
                    <span class="logo-text">销售智能体</span>
                </div>
                <button class="new-chat-btn">+ 新对话</button>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15 18l-6-6 6-6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-item active">
                    <span class="menu-icon">💬</span>
                    <span class="menu-text">对话</span>
                </div>
            </div>
            
            <div class="history-section">
                <div class="history-title">历史对话</div>
                <div class="history-list">
                    <div class="history-item">
                        <span class="history-icon">📋</span>
                        <span class="history-text">客户需求分析</span>
                    </div>
                    <div class="history-item">
                        <span class="history-icon">📊</span>
                        <span class="history-text">竞品对比报告</span>
                    </div>
                    <div class="history-item">
                        <span class="history-icon">🎯</span>
                        <span class="history-text">产品方案推荐</span>
                        <span class="badge">1</span>
                    </div>
                    <div class="history-item">
                        <span class="history-icon">🗡️</span>
                        <span class="history-text">销售话术优化</span>
                    </div>
                    <div class="history-item">
                        <span class="history-icon">📈</span>
                        <span class="history-text">季度销售预测</span>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><img src="thinker-logo.png" width="36" height="36" style="border-radius: 50%;"></div>
                    <span class="user-name">销售助手</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <button class="menu-toggle">☰</button>
                <span class="header-title">新对话</span>
                <div class="header-actions"></div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-section">
                    <h1 class="welcome-title">
                        有什么我能帮你的吗？
                        <span class="welcome-logo-inline">
                            <img id="welcomeLogo" src="thinker-logo.png" style="border-radius: 50%; width: 110px; height: 110px;" class="welcome-logo-img">
                        </span>
                    </h1>
                    <p class="welcome-subtitle">我是您的销售助手，可以帮您分析客户需求、解答产品问题、生成销售方案</p>
                    <div class="suggestion-grid">
                          <div class="suggestion-item" onclick="sendSuggestion('显示我的任务')">
                            <span style="margin-right: 6px;">📋</span>您有<strong style="color: #3b82f6;">2</strong>项任务待完成，看看吧？
                          </div>
                          <div class="suggestion-item" onclick="sendSuggestion('标讯处理')">
                            <span style="margin-right: 6px;">📢</span>您有<strong style="color: #ef4444;">5</strong>条标讯待处理，看一看？
                          </div>
                          <div class="suggestion-item" onclick="sendSuggestion('有更新资讯的高价值客户')">
                            <span style="margin-right: 6px;">📢</span>高价值客户有<strong style="color: #8b5cf6;">资讯</strong>更新，看看吧！
                          </div>
                    </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-main">
                        <textarea 
                            id="messageInput" 
                            placeholder="输入您的问题..." 
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M22 2L15 22L11 13L2 8L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-toolbar">
                        <button class="tool-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <line x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                        <div class="divider"></div>
                        <button class="tool-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor"/>
                                <rect x="5" y="6" width="14" height="2" fill="currentColor" stroke="currentColor"/>
                                <rect x="5" y="10" width="10" height="2" fill="currentColor" stroke="currentColor"/>
                                <rect x="5" y="14" width="7" height="2" fill="currentColor" stroke="currentColor"/>
                            </svg>
                            <span>PPT生成</span>
                        </button>
                        <button class="tool-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor"/>
                                <rect x="5" y="7" width="8" height="3" fill="currentColor"/>
                                <rect x="5" y="12" width="12" height="3" fill="currentColor"/>
                                <rect x="5" y="17" width="5" height="3" fill="currentColor"/>
                            </svg>
                            <span>我的日历</span>
                        </button>
                        <button class="tool-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="3" width="18" height="18" y="5" rx="2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M3 5h18v14H3v-14z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9 10l6 2-6 2V10z" fill="currentColor"/>
                            </svg>
                            <span>拜访规划</span>
                        </button>
                        <button class="tool-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                                <path d="M12 3v9l7 4-7 4z" fill="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span>情报洞察</span>
                        </button>
                    </div>
                  </div>
            </div>
        </main>
    </div>

    <script src="customerAnalysis.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
